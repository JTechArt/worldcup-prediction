# PostgreSQL mode — for production / multi-user deployments.
# Usage: docker compose -f docker-compose.postgres.yml up --build
version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: worldcup-db
    environment:
      POSTGRES_DB: worldcup
      POSTGRES_USER: ${DATABASE_USERNAME:-worldcup}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-worldcup}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-worldcup} -d worldcup"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldcup-app
    environment:
      APP_PROFILE: postgres
      DATABASE_URL: jdbc:postgresql://db:5432/worldcup
      DATABASE_USERNAME: ${DATABASE_USERNAME:-worldcup}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-worldcup}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-placeholder}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-placeholder}
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
