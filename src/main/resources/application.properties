spring.application.name=world-cup-prediction

# Default profile: sqlite (zero-config local deployment)
# Override with: APP_PROFILE=postgres (or SPRING_PROFILES_ACTIVE=postgres)
spring.profiles.active=${APP_PROFILE:sqlite}

# JPA / Hibernate (dialect set per profile)
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Server
server.port=8888
server.servlet.session.timeout=7d
server.forward-headers-strategy=framework

# OAuth2 — Google (built-in provider)
# Fallback values allow the app to start locally without env vars.
# OAuth2 login won't work until real credentials are provided.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-dev-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-dev-placeholder}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:http://localhost:8888}/login/oauth2/code/google

# OAuth2 — LinkedIn (custom OIDC provider)
spring.security.oauth2.client.registration.linkedin.client-id=${LINKEDIN_CLIENT_ID:local-dev-placeholder}
spring.security.oauth2.client.registration.linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:local-dev-placeholder}
spring.security.oauth2.client.registration.linkedin.scope=openid,profile,email
spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.linkedin.client-name=LinkedIn
spring.security.oauth2.client.registration.linkedin.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.linkedin.redirect-uri=${APP_BASE_URL:http://localhost:8888}/login/oauth2/code/linkedin

spring.security.oauth2.client.provider.linkedin.issuer-uri=https://www.linkedin.com/oauth
spring.security.oauth2.client.provider.linkedin.authorization-uri=https://www.linkedin.com/oauth/v2/authorization
spring.security.oauth2.client.provider.linkedin.token-uri=https://www.linkedin.com/oauth/v2/accessToken
spring.security.oauth2.client.provider.linkedin.user-info-uri=https://api.linkedin.com/v2/userinfo
spring.security.oauth2.client.provider.linkedin.jwk-set-uri=https://www.linkedin.com/oauth/openid/jwks
spring.security.oauth2.client.provider.linkedin.user-name-attribute=sub

# ── Integration feature flags ────────────────────────────────────────────────
# Set MAIL_ENABLED=true in .env (and configure SMTP_* vars) to send real emails.
# Set FOOTBALL_API_ENABLED=true and FOOTBALL_API_KEY in .env to enable live sync.
# When disabled, components log intent only and the app starts without the service.
app.mail.enabled=${MAIL_ENABLED:false}
app.football.api.enabled=${FOOTBALL_API_ENABLED:false}
app.lineup-sync.enabled=${LINEUP_SYNC_ENABLED:false}
app.notification.enabled=${NOTIFICATION_ENABLED:false}
app.prediction-window.enabled=${PREDICTION_WINDOW_ENABLED:true}
app.notification.reminder-hours-before=${NOTIFICATION_REMINDER_HOURS:3}
app.mail.from=${MAIL_FROM:noreply@worldcup.example.com}
app.base-url=${APP_BASE_URL:http://localhost:8888}
app.timezone=${APP_TIMEZONE:Asia/Yerevan}
spring.jpa.properties.hibernate.jdbc.time_zone=${APP_TIMEZONE:Asia/Yerevan}

# Football Data API (only used when app.football.api.enabled=true)
football.api.key=${FOOTBALL_API_KEY:}

# Email / SMTP (only used when app.mail.enabled=true)
spring.mail.host=${SPRING_MAIL_HOST:smtp.resend.com}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:resend}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_HOST:smtp.resend.com}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Logging
logging.level.com.worldcup.prediction=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO

# Super Admin bootstrap (only used on first startup)
app.super-admin.username=${ADMIN_USERNAME:admin}
app.super-admin.password=${ADMIN_PASSWORD:admin}
app.super-admin.email=${ADMIN_EMAIL:admin@fifaworldcup2026prediction.win}

# Restore upload — SQLite databases can be tens of MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
