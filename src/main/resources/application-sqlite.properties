# SQLite file-based database (default deployment)
# Database file location: override with SQLITE_PATH env var
spring.datasource.url=jdbc:sqlite:${SQLITE_PATH:./worldcup.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite only supports one writer at a time — a single connection eliminates SQLITE_BUSY errors
# from concurrent scheduled tasks competing for the write lock.
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
# Wait up to 30s for the connection before throwing (default is 30s, kept explicit)
spring.datasource.hikari.connection-timeout=30000
# WAL mode allows reads to proceed concurrently with the single writer
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL

# SQLite dialect from hibernate-community-dialects
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# SQLite INTEGER PRIMARY KEY is stored as 64-bit integer but reported as "integer" type,
# which causes Hibernate schema validation to fail (expects "bigint" for Long fields).
# Flyway already validates the schema — disable Hibernate's redundant check for SQLite.
spring.jpa.hibernate.ddl-auto=none

# Flyway: SQLite does not support DDL transactions — mixed mode required
spring.flyway.locations=classpath:db/migration,classpath:db/seed
spring.flyway.mixed=true
# Allow local edits to versioned migrations without requiring manual repair
spring.flyway.validate-on-migrate=false

# Show SQL in development (SQLite is always local)
spring.jpa.show-sql=true

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Thymeleaf hot reload
spring.thymeleaf.cache=false
