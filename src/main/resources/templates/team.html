<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main-content})}">
<head><title>Team</title></head>
<body>
<th:block th:fragment="main-content">

<!-- Hero Header (full-width) -->
<div class="relative overflow-hidden animate-fade-up"
     th:style="'background: linear-gradient(135deg, #006b2a 0%, #00c853 50%, #004d1e 100%); background-image: url(' + ${heroImage} + '); background-size: cover; background-position: center; min-height: 280px;'">
  <!-- Dark gradient overlay -->
  <div class="absolute inset-0" style="background: linear-gradient(to right, rgba(0,80,30,0.7), transparent);"></div>

  <div class="relative max-w-4xl mx-auto px-4 py-12 flex items-center gap-6 min-h-[280px]">
    <div class="flex items-center gap-6 z-10">
      <img th:src="@{'/images/flags/' + ${team.flagCode} + '.svg'}"
           class="w-20 h-20 rounded-full shadow-lg border-4 border-white/80" th:alt="${team.name}" />
      <div>
        <h1 class="font-display text-4xl md:text-6xl text-white drop-shadow-lg" th:text="${team.name}">Team Name</h1>
        <div class="flex items-center gap-3 mt-2">
          <span class="text-white/80 text-sm" th:text="${team.confederation}">UEFA</span>
          <span th:if="${teamGroup != null}"
                class="phase-badge"
                th:text="'Group ' + ${teamGroup.name}">Group A</span>
        </div>
      </div>
    </div>

    <!-- Star player image (if exists) -->
    <div th:if="${hasStarImage}" class="absolute right-4 bottom-0 hidden md:block animate-fade-up stagger-3">
      <img th:src="${starImage}" class="h-72 md:h-80 drop-shadow-2xl" alt="Star player" />
    </div>
  </div>
</div>

<div class="max-w-4xl mx-auto px-4 py-10 space-y-8">

  <!-- Group Standing Mini-Card -->
  <div th:if="${standing != null}"
       class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 animate-fade-up stagger-1">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold text-gray-700 text-sm uppercase tracking-wide">
        Group <span th:text="${teamGroup.name}">A</span> Standing
      </h2>
      <a th:href="@{/groups}" class="text-xs text-green-dark hover:underline font-semibold">View all groups →</a>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-xs text-gray-400 uppercase tracking-wide">
            <th class="text-center py-2 px-2">P</th>
            <th class="text-center py-2 px-2">W</th>
            <th class="text-center py-2 px-2">D</th>
            <th class="text-center py-2 px-2">L</th>
            <th class="text-center py-2 px-2">GF</th>
            <th class="text-center py-2 px-2">GA</th>
            <th class="text-center py-2 px-2">GD</th>
            <th class="text-center py-2 px-2 font-bold">Pts</th>
          </tr>
        </thead>
        <tbody>
          <tr class="bg-green-50 rounded-lg">
            <td class="text-center py-2 px-2 font-medium" th:text="${standing.played}">0</td>
            <td class="text-center py-2 px-2" th:text="${standing.won}">0</td>
            <td class="text-center py-2 px-2" th:text="${standing.drawn}">0</td>
            <td class="text-center py-2 px-2" th:text="${standing.lost}">0</td>
            <td class="text-center py-2 px-2" th:text="${standing.goalsFor}">0</td>
            <td class="text-center py-2 px-2" th:text="${standing.goalsAgainst}">0</td>
            <td class="text-center py-2 px-2 font-medium"
                th:text="${standing.goalDifference > 0 ? '+' + standing.goalDifference : standing.goalDifference}">0</td>
            <td class="text-center py-2 px-2 font-bold text-green-dark" th:text="${standing.points}">0</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Results (Completed Matches) -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 animate-fade-up stagger-2">
    <h2 class="font-bold text-gray-700 text-sm uppercase tracking-wide mb-4">Results</h2>
    <div th:if="${#lists.isEmpty(completedMatches)}" class="text-sm text-gray-400">No matches played yet.</div>
    <div class="space-y-2">
      <a th:each="m : ${completedMatches}"
         th:href="@{'/matches/' + ${m.id}}"
         class="flex items-center gap-4 p-3 rounded-xl hover:bg-gray-50 transition-colors text-sm">
        <!-- Opponent flag + name -->
        <div class="flex items-center gap-2 flex-1 min-w-0">
          <img th:if="${m.homeTeam != null and m.homeTeam.id != team.id}"
               th:src="@{'/images/flags/' + ${m.homeTeam.flagCode} + '.svg'}"
               class="flag-circle-sm" />
          <img th:if="${m.awayTeam != null and m.awayTeam.id != team.id}"
               th:src="@{'/images/flags/' + ${m.awayTeam.flagCode} + '.svg'}"
               class="flag-circle-sm" />
          <span class="font-medium text-gray-800 truncate"
                th:text="${m.homeTeam != null and m.homeTeam.id != team.id ? m.homeTeam.name : (m.awayTeam != null and m.awayTeam.id != team.id ? m.awayTeam.name : 'TBD')}">Opponent</span>
          <span class="text-xs text-gray-400"
                th:text="${m.homeTeam != null and m.homeTeam.id == team.id ? '(H)' : '(A)'}"></span>
        </div>
        <!-- Score -->
        <span class="font-mono font-bold text-gray-900"
              th:text="${m.homeScore + ' – ' + m.awayScore}">2 – 1</span>
        <!-- Result dot -->
        <span th:with="result=${matchResults[m.id]}"
              class="w-3 h-3 rounded-full flex-shrink-0"
              th:classappend="${result == 'win' ? 'bg-green-500' : (result == 'loss' ? 'bg-red-500' : 'bg-yellow-400')}"></span>
      </a>
    </div>
  </div>

  <!-- Upcoming Matches -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 animate-fade-up stagger-3">
    <h2 class="font-bold text-gray-700 text-sm uppercase tracking-wide mb-4">Upcoming</h2>
    <div th:if="${#lists.isEmpty(upcomingMatches)}" class="text-sm text-gray-400">No upcoming matches.</div>
    <div class="space-y-2">
      <a th:each="m : ${upcomingMatches}"
         th:href="@{'/matches/' + ${m.id}}"
         class="flex items-center gap-4 p-3 rounded-xl hover:bg-gray-50 transition-colors text-sm">
        <!-- Opponent flag + name -->
        <div class="flex items-center gap-2 flex-1 min-w-0">
          <img th:if="${m.homeTeam != null and m.homeTeam.id != team.id}"
               th:src="@{'/images/flags/' + ${m.homeTeam.flagCode} + '.svg'}"
               class="flag-circle-sm" />
          <img th:if="${m.awayTeam != null and m.awayTeam.id != team.id}"
               th:src="@{'/images/flags/' + ${m.awayTeam.flagCode} + '.svg'}"
               class="flag-circle-sm" />
          <span class="font-medium text-gray-800 truncate"
                th:text="${m.homeTeam != null and m.homeTeam.id != team.id ? m.homeTeam.name : (m.awayTeam != null and m.awayTeam.id != team.id ? m.awayTeam.name : (m.homeTeamPlaceholder != null ? m.homeTeamPlaceholder : m.awayTeamPlaceholder))}">Opponent</span>
          <span class="text-xs text-gray-400"
                th:text="${m.homeTeam != null and m.homeTeam.id == team.id ? '(H)' : '(A)'}"></span>
        </div>
        <!-- Kickoff date/time -->
        <span class="text-xs text-gray-400 flex-shrink-0"
              th:text="${#temporals.format(m.kickoffTime, 'd MMM HH:mm')}">11 Jun 19:00</span>
        <!-- Venue -->
        <span th:if="${m.venue != null}" class="text-xs text-gray-400 hidden sm:inline truncate max-w-[140px]"
              th:text="${m.venue}">Venue</span>
      </a>
    </div>
  </div>

  <!-- Squad -->
  <div th:if="${not #lists.isEmpty(players)}"
       class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 animate-fade-up stagger-4">
    <h2 class="font-bold text-gray-700 text-sm uppercase tracking-wide mb-4">Squad</h2>
    <div th:each="pos : ${ {'Goalkeeper','Defender','Midfielder','Forward'} }" class="mb-4">
      <p class="text-xs font-semibold text-gray-400 uppercase mb-2" th:text="${pos}">Position</p>
      <div class="space-y-1">
        <div th:each="p : ${players}"
             th:if="${p.position != null and p.position.contains(pos.substring(0,3))}"
             class="flex items-center gap-3 text-sm py-1">
          <span class="w-6 text-right font-mono text-gray-400 text-xs"
                th:text="${p.shirtNumber != null ? p.shirtNumber : '–'}">1</span>
          <span class="font-medium text-gray-800" th:text="${p.name}">Player Name</span>
          <span th:if="${p.tournamentGoals > 0}"
                class="ml-auto text-xs font-semibold text-green-700"
                th:text="${p.tournamentGoals + ' ⚽'}">3 ⚽</span>
        </div>
      </div>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(players)}" class="text-sm text-gray-400 text-center py-4">
    Squad data not yet available. Run bootstrap to populate.
  </div>

</div>
</th:block>
</body>
</html>
