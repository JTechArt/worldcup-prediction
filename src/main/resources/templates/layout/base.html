<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:fragment="layout(content)">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle} + ' · WC Predict 2026'">WC Predict 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            green:  { DEFAULT: '#00c853', dark: '#006b2a', light: '#e8f5e9' },
            orange: { DEFAULT: '#FF5722' },
            gold:   { DEFAULT: '#FFD600' },
            bg:     { DEFAULT: '#f0fdf5' },
          },
          fontFamily: {
            display: ['"Bebas Neue"', 'sans-serif'],
            body:    ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <script>
    document.addEventListener('htmx:configRequest', function(evt) {
      var t = document.querySelector('meta[name="_csrf"]');
      var h = document.querySelector('meta[name="_csrf_header"]');
      if (t && h) evt.detail.headers[h.content] = t.content;
    });
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; background: #f0fdf5; color: #1a2e1a; }
    .font-display { font-family: 'Bebas Neue', sans-serif; }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer  { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes pulse-glow { 0%,100%{box-shadow:0 0 8px 0 rgba(0,200,83,0.4)} 50%{box-shadow:0 0 20px 4px rgba(0,200,83,0.7)} }
    @keyframes spin-slow { to { transform:rotate(360deg); } }
    @keyframes greenPulse { 0%,100%{box-shadow:0 4px 20px rgba(0,200,83,0.4)} 50%{box-shadow:0 4px 36px rgba(0,200,83,0.7)} }

    .animate-fade-up    { animation: fadeUp   0.6s ease both; }
    .animate-fade-down  { animation: fadeDown 0.6s ease both; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .animate-spin-slow  { animation: spin-slow 10s linear infinite; }
    .animate-green-pulse { animation: greenPulse 2.5s ease-in-out infinite; }

    .stagger-1 { animation-delay:0.05s; }
    .stagger-2 { animation-delay:0.10s; }
    .stagger-3 { animation-delay:0.15s; }
    .stagger-4 { animation-delay:0.20s; }
    .stagger-5 { animation-delay:0.25s; }
    .stagger-6 { animation-delay:0.30s; }

    .navbar { animation: fadeDown 0.7s ease both; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }

    .flag-circle    { display:inline-block; width:28px; height:28px; border-radius:50%; object-fit:cover; border:2px solid rgba(255,255,255,0.5); vertical-align:middle; }
    .flag-circle-sm { width:20px; height:20px; border-radius:50%; object-fit:cover; border:1px solid rgba(0,0,0,0.1); vertical-align:middle; display:inline-block; }

    .phase-badge {
      background: linear-gradient(90deg,#006b2a 0%,#00c853 40%,#FFD600 70%,#006b2a 100%);
      background-size:200% 100%;
      animation: shimmer 3s linear infinite;
      color:white; border-radius:6px; padding:2px 10px;
      font-family:'Bebas Neue',sans-serif; letter-spacing:1px; font-size:13px;
    }

    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:#e8f5e9; }
    ::-webkit-scrollbar-thumb { background:#00c853; border-radius:99px; }
  </style>
</head>
<body class="min-h-screen bg-bg flex flex-col">

  <!-- NAVBAR -->
  <nav class="navbar fixed top-0 left-0 right-0 z-50 bg-green-dark/95 border-b border-green/20 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">

        <a th:href="@{/}" class="flex items-center gap-2.5 no-underline">
          <div class="w-9 h-9 rounded-full bg-gradient-to-br from-green to-green-dark
                      flex items-center justify-center text-lg
                      animate-spin-slow shadow-lg shadow-green/40">⚽</div>
          <span class="font-display text-2xl tracking-widest text-white">
            WC PREDICT&nbsp;<span class="text-gold">2026</span>
          </span>
        </a>

        <div class="hidden md:flex items-center gap-1">
          <a th:href="@{/leaderboard}" class="px-4 py-2 rounded-lg text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition-all duration-200">🏆 Leaderboard</a>
          <a th:href="@{/fixtures}"    class="px-4 py-2 rounded-lg text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition-all duration-200">📅 Fixtures</a>
          <a th:href="@{/groups}"      class="px-4 py-2 rounded-lg text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition-all duration-200">🗂 Groups</a>
          <a th:href="@{/bracket}"     class="px-4 py-2 rounded-lg text-sm font-semibold text-white/70 hover:text-white hover:bg-white/10 transition-all duration-200">🎯 Bracket</a>
        </div>

        <div class="flex items-center gap-3">
          <div sec:authorize="isAuthenticated()" class="flex items-center gap-3">
            <a th:href="@{/home}"        class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-semibold text-white/80 hover:text-white hover:bg-white/10 transition-all duration-200">🏠 Home</a>
            <a th:href="@{/predictions}" class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-semibold text-white/80 hover:text-white hover:bg-white/10 transition-all duration-200">⚡ Predict</a>

            <div class="relative" x-data="{ open: false }">
              <button @click="open = !open" class="flex items-center gap-2 focus:outline-none group">
                <img th:src="${#authentication.getPrincipal().getAvatarUrl()}"
                     th:alt="${#authentication.getPrincipal().getDisplayName()}"
                     class="w-9 h-9 rounded-full border-2 border-green/50 group-hover:border-green transition-colors"
                     onerror="this.src='https://ui-avatars.com/api/?name='+encodeURIComponent(this.alt)+'&background=006b2a&color=fff'" />
                <span class="hidden lg:block text-sm font-semibold text-white/80"
                      th:text="${#authentication.getPrincipal().getDisplayName()}">User</span>
              </button>

              <div x-show="open" @click.outside="open = false"
                   x-transition:enter="transition ease-out duration-150"
                   x-transition:enter-start="opacity-0 translate-y-1"
                   x-transition:enter-end="opacity-100 translate-y-0"
                   x-transition:leave="transition ease-in duration-100"
                   x-transition:leave-start="opacity-100 translate-y-0"
                   x-transition:leave-end="opacity-0 translate-y-1"
                   class="absolute right-0 top-12 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-1 z-50"
                   style="display:none">
                <a th:href="@{/home}"        class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-green-light hover:text-green-dark transition-colors">🏠 Dashboard</a>
                <a th:href="@{/predictions}" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-green-light hover:text-green-dark transition-colors">⚡ My Predictions</a>
                <div class="border-t border-gray-100 my-1"></div>
                <form th:action="@{/logout}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                  <button type="submit" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors text-left">🚪 Sign out</button>
                </form>
              </div>
            </div>
          </div>

          <div sec:authorize="isAnonymous()">
            <a th:href="@{/}"
               class="flex items-center gap-2 bg-green hover:bg-green/90 text-white font-bold text-sm px-5 py-2 rounded-xl transition-all duration-200 animate-green-pulse shadow-lg shadow-green/30">
              Sign in
            </a>
          </div>
        </div>

      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main class="flex-1 pt-16">
    <th:block th:replace="${content}" />
  </main>

  <!-- FOOTER -->
  <footer class="bg-green-dark text-white/60 py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-2">
          <span class="text-2xl">⚽</span>
          <span class="font-display text-xl tracking-widest text-white">WC PREDICT <span class="text-gold">2026</span></span>
        </div>
        <div class="flex items-center gap-6 text-sm">
          <a th:href="@{/leaderboard}" class="hover:text-white transition-colors">Leaderboard</a>
          <a th:href="@{/fixtures}"    class="hover:text-white transition-colors">Fixtures</a>
          <a th:href="@{/groups}"      class="hover:text-white transition-colors">Groups</a>
          <a th:href="@{/bracket}"     class="hover:text-white transition-colors">Bracket</a>
        </div>
        <div class="text-xs text-white/40">FIFA World Cup 2026 · Internal Prediction Game</div>
      </div>
    </div>
  </footer>

</body>
</html>
