<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head><title>Communities</title></head>
<body>

<th:block layout:fragment="page-title">Communities</th:block>

<th:block layout:fragment="content">

  <div class="space-y-6">

    <!-- Create community -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Create Community</h2>
      <form th:action="@{/admin/communities/create}" method="post" class="space-y-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" name="name" required placeholder="My Prediction League"
                   class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
            <input type="text" name="slug" required placeholder="my-league" pattern="[a-z0-9\-]+"
                   class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border"/>
            <p class="text-xs text-gray-400 mt-1">URL: /c/<strong>slug</strong>/home</p>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <input type="text" name="description" placeholder="Optional description"
                 class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border"/>
        </div>
        <button type="submit" class="bg-admin-dark hover:bg-admin-mid text-white rounded-lg px-4 py-2 text-sm font-semibold">
          Create Community
        </button>
      </form>
    </div>

    <!-- Add user to community -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Add User to Community</h2>
      <form th:action="@{/admin/communities/0/members/add}" method="post"
            id="addMemberForm" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Community</label>
          <select name="communityId" id="communitySelect" required
                  class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border"
                  onchange="document.getElementById('addMemberForm').action='/admin/communities/' + this.value + '/members/add'">
            <option value="">Select community…</option>
            <option th:each="c : ${communities}" th:value="${c.id}" th:text="${c.name}">Community</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">User</label>
          <select name="userId" required class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border">
            <option value="">Select user…</option>
            <option th:each="u : ${allUsers}" th:value="${u.id}"
                    th:text="${u.firstName + ' ' + u.lastName + ' (' + u.email + ')'}">User</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
          <div class="flex gap-2">
            <select name="role" class="flex-1 rounded-lg border-gray-300 text-sm px-3 py-2 border">
              <option value="MEMBER">Member</option>
              <option value="ADMIN">Admin</option>
            </select>
            <button type="submit" class="bg-admin-dark hover:bg-admin-mid text-white rounded-lg px-4 py-2 text-sm font-semibold whitespace-nowrap">Add</button>
          </div>
        </div>
      </form>
    </div>

    <!-- Communities list -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-100">
        <h2 class="font-semibold text-gray-800">All Communities</h2>
      </div>

      <div th:if="${#lists.isEmpty(communities)}" class="px-6 py-8 text-center text-sm text-gray-400">
        No communities created yet.
      </div>

      <table th:unless="${#lists.isEmpty(communities)}" class="w-full text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left font-semibold text-gray-600">Name</th>
            <th class="px-4 py-3 text-left font-semibold text-gray-600">Slug</th>
            <th class="px-4 py-3 text-left font-semibold text-gray-600">Description</th>
            <th class="px-4 py-3 text-center font-semibold text-gray-600">Created</th>
            <th class="px-4 py-3 text-right font-semibold text-gray-600">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr th:each="c : ${communities}">
            <td class="px-4 py-3 font-semibold text-gray-800" th:text="${c.name}">Name</td>
            <td class="px-4 py-3 font-mono text-xs text-gray-500" th:text="${c.slug}">slug</td>
            <td class="px-4 py-3 text-gray-500 text-xs" th:text="${c.description ?: '—'}">—</td>
            <td class="px-4 py-3 text-center text-xs text-gray-400" th:text="${#temporals.format(c.createdAt, 'dd MMM yyyy')}">01 Jan 2026</td>
            <td class="px-4 py-3 text-right">
              <div class="flex items-center justify-end gap-2">
                <a th:href="@{'/c/' + ${c.slug} + '/admin/members'}" class="px-2 py-1 rounded text-xs font-semibold bg-blue-100 text-blue-700 hover:bg-blue-200">Members</a>
                <a th:href="@{'/c/' + ${c.slug} + '/home'}" class="px-2 py-1 rounded text-xs font-semibold bg-green-100 text-green-700 hover:bg-green-200">Enter</a>
                <form th:action="@{'/admin/communities/' + ${c.id} + '/delete'}" method="post" class="inline"
                      onsubmit="return confirm('Are you sure? This will delete the community and all its data.')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="px-2 py-1 rounded text-xs font-semibold bg-red-100 text-red-700 hover:bg-red-200">Delete</button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</th:block>
</body>
</html>
