<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login · Mundial '26</title>
  <link rel="icon" type="image/webp" href="/images/favicon.webp" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'wc-green':      '#00c853',
            'wc-dark-green': '#006b2a',
            'wc-gold':       '#FFD600',
          },
          fontFamily: {
            'display': ['Bebas Neue', 'sans-serif'],
            'body':    ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-900 flex items-center justify-center">

  <div class="w-full max-w-sm px-6">

    <div class="text-center mb-8">
      <div class="text-4xl mb-3">🔒</div>
      <h1 class="font-display text-3xl text-white tracking-widest">ADMIN LOGIN</h1>
      <p class="text-gray-500 text-sm mt-1">Super Admin access only</p>
    </div>

    <div class="bg-gray-800 rounded-2xl shadow-xl p-8 border border-gray-700">

      <div th:if="${error}"
           class="mb-6 bg-red-900/50 border border-red-700 text-red-300 text-sm rounded-lg px-4 py-3 text-center"
           role="alert">
        <span th:text="${error}">Error</span>
      </div>

      <form th:action="@{/admin/login/form}" method="post" class="space-y-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div>
          <label for="username" class="block text-sm font-medium text-gray-400 mb-1">Email</label>
          <input type="text" id="username" name="username" required autofocus
                 class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-wc-green focus:ring-1 focus:ring-wc-green"
                 placeholder="admin@worldcup.local" />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-400 mb-1">Password</label>
          <input type="password" id="password" name="password" required
                 class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-wc-green focus:ring-1 focus:ring-wc-green"
                 placeholder="Enter password" />
        </div>

        <button type="submit"
                class="w-full bg-wc-dark-green hover:bg-wc-green text-white font-bold py-2.5 rounded-lg transition-colors mt-2">
          Sign In
        </button>
      </form>
    </div>

    <div class="text-center mt-6">
      <a href="/" class="text-gray-600 hover:text-gray-400 text-xs transition-colors">← Back to main site</a>
    </div>

  </div>

</body>
</html>
