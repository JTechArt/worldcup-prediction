<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main-content})}">
<head><title>Groups</title></head>
<body>
<th:block th:fragment="main-content">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10"
       x-data="{ tab: $el.dataset.defaultTab }" th:data-default-tab="${defaultTab}">

    <!-- Page header -->
    <div class="mb-6 animate-fade-up">
      <h1 class="font-display text-5xl text-white tracking-wider mb-1">STANDINGS</h1>
      <p class="text-white/60 text-sm font-medium">Group Stage · Play Off</p>
    </div>

    <!-- Tab bar -->
    <div class="flex gap-2 mb-8 animate-fade-up stagger-1">
      <button @click="tab = 'groups'"
              :class="tab === 'groups' ? 'bg-green-dark text-white shadow-md' : 'bg-white/10 text-white/70 hover:bg-white/20'"
              class="px-6 py-2 rounded-xl text-sm font-semibold transition-all duration-200">
        Groups
      </button>
      <button @click="tab = 'playoff'"
              :class="tab === 'playoff' ? 'bg-green-dark text-white shadow-md' : 'bg-white/10 text-white/70 hover:bg-white/20'"
              class="px-6 py-2 rounded-xl text-sm font-semibold transition-all duration-200">
        Play Off
      </button>
    </div>

    <!-- Groups tab content -->
    <div x-show="tab === 'groups'" x-transition>

      <!-- Legend -->
      <div class="flex flex-wrap gap-4 mb-8 animate-fade-up stagger-2">
        <div class="flex items-center gap-2 text-xs font-semibold text-white/70">
          <div class="w-3 h-3 rounded-full bg-green/70"></div> Qualified (R32)
        </div>
        <div class="flex items-center gap-2 text-xs font-semibold text-white/70">
          <div class="w-3 h-3 rounded-full bg-gold/70"></div> Best 3rd place (may qualify)
        </div>
        <div class="flex items-center gap-2 text-xs font-semibold text-white/70">
          <div class="w-3 h-3 rounded-full bg-gray-300"></div> Eliminated
        </div>
      </div>

      <!-- Group cards grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

        <div th:each="groupEntry, gStat : ${groups}"
             th:classappend="'animate-fade-up stagger-' + ${gStat.index < 6 ? gStat.index + 1 : 6}"
             class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden
                    hover:shadow-lg hover:border-green/20 transition-all duration-300">

          <!-- Group header -->
          <div class="bg-gradient-to-r from-green-dark to-green px-4 sm:px-5 py-3 flex items-center justify-between">
            <span class="font-display text-2xl text-white tracking-widest" th:text="${groupEntry.key}">Group A</span>
            <span class="text-xs font-semibold text-white/60 hidden sm:inline">P W D L GD Pts</span>
            <span class="text-xs font-semibold text-white/60 sm:hidden">P W D L Pts</span>
          </div>

          <!-- Standings rows -->
          <div class="divide-y divide-gray-50">
            <a th:each="team, tStat : ${groupEntry.value}"
               th:href="${team.teamId != null ? '/teams/' + team.teamId : '#'}"
                 class="flex items-center gap-2 sm:gap-3 px-3 sm:px-4 py-2.5 sm:py-3 transition-colors duration-150"
                 th:classappend="${team.qualificationStatus == 'QUALIFIED' ? 'bg-green/5 border-l-4 border-l-green/60' :
                                 (team.qualificationStatus == 'THIRD' and qualifiedThirdGroups.contains(groupEntry.key)) ? 'bg-gold/5 border-l-4 border-l-gold/50' :
                                 'border-l-4 border-l-transparent'}">

              <!-- Position -->
              <span class="w-5 text-center text-xs font-bold flex-shrink-0"
                    th:text="${tStat.count}"
                    th:classappend="${tStat.count == 1} ? 'text-green-dark' : (${tStat.count == 2} ? 'text-green' : 'text-gray-400')">1</span>

              <!-- Flag -->
              <img th:if="${team.teamCode != null}"
                   th:src="@{'/images/flags/' + ${team.teamCode} + '.svg'}"
                   th:alt="${team.teamName}"
                   class="w-6 h-6 sm:w-7 sm:h-7 rounded-full border border-gray-100 flex-shrink-0 object-cover" />
              <div th:unless="${team.teamCode != null}"
                   class="w-6 h-6 sm:w-7 sm:h-7 rounded-full bg-gray-100 flex-shrink-0 flex items-center justify-center text-xs text-gray-400">?</div>

              <!-- Team name -->
              <span class="flex-1 text-[10px] sm:text-sm font-semibold text-gray-800 truncate" th:text="${team.teamName}">Brazil</span>

              <!-- Stats: P W D L GD Pts -->
              <div class="flex items-center gap-2 sm:gap-3 text-xs flex-shrink-0">
                <span class="w-4 text-center text-gray-500"       th:text="${team.played}">0</span>
                <span class="w-4 text-center text-gray-600 font-medium" th:text="${team.won}">0</span>
                <span class="w-4 text-center text-gray-500"       th:text="${team.drawn}">0</span>
                <span class="w-4 text-center text-gray-500"       th:text="${team.lost}">0</span>
                <span class="w-6 text-center font-medium hidden sm:inline"
                      th:text="${team.goalDifference > 0 ? '+' + team.goalDifference : team.goalDifference}"
                      th:classappend="${team.goalDifference > 0} ? 'text-green-dark' : (${team.goalDifference < 0} ? 'text-red-500' : 'text-gray-400')">0</span>
                <span class="w-6 text-center font-bold text-green-dark" th:text="${team.points}">0</span>
              </div>

            </a>
          </div>

          <!-- Matches for this group -->
          <div th:if="${matchesByGroup != null and matchesByGroup[groupEntry.key] != null}"
               class="border-t border-gray-50 divide-y divide-gray-50">
            <a th:each="m : ${matchesByGroup[groupEntry.key]}"
               th:href="@{'/matches/' + ${m.id}}"
               class="flex items-center gap-3 px-4 py-2.5 hover:bg-gray-50 transition-colors text-xs">
              <span class="text-gray-400 w-16 flex-shrink-0"
                    th:text="${#temporals.format(m.kickoffTime, 'd MMM HH:mm')}">11 Jun</span>
              <span class="flex-1 font-medium text-gray-700 text-[10px] sm:text-xs truncate"
                    th:text="${(m.homeTeam != null ? m.homeTeam.name : m.homeTeamPlaceholder) + ' – ' + (m.awayTeam != null ? m.awayTeam.name : m.awayTeamPlaceholder)}">Home – Away</span>
              <span th:if="${m.homeScore != null}"
                    class="font-mono font-bold text-gray-800"
                    th:text="${m.homeScore + ':' + m.awayScore}">2:1</span>
              <span th:unless="${m.homeScore != null}"
                    class="text-gray-300">—</span>
            </a>
          </div>

        </div>
      </div>

    </div>

    <!-- Play Off tab content -->
    <div x-show="tab === 'playoff'" x-transition>

      <!-- Bracket CSS (required because bracket-view fragment has no styles) -->
      <style>
        .bracket-scroll { overflow-x: auto; padding-bottom: 16px; }
        .bracket-grid   { display:flex; gap:32px; align-items:flex-start; min-width:max-content; padding:24px 16px; }
        .round-col      { display:flex; flex-direction:column; gap:0; }
        .round-header   {
          font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:0.08em;
          text-align:center; padding:6px 16px;
          background:linear-gradient(135deg,#006b2a,#00c853); color:white;
          border-radius:8px 8px 0 0; position:sticky; top:0; z-index:1;
          overflow:hidden;
        }
        .round-header::after {
          content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
          background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
          animation:shimmer 2.5s infinite;
        }
        @keyframes shimmer { to { left:200%; } }
        .matches-col { display:flex; flex-direction:column; justify-content:space-around; flex:1; gap:10px; padding:10px 0; }
        .match-card {
          background:white; border-radius:12px; border:2px solid #e2f5ea;
          padding:10px 14px; min-width:180px;
          box-shadow:0 2px 8px rgba(0,107,42,0.08); transition:box-shadow .2s,transform .2s;
        }
        .match-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,107,42,0.15); }
        .match-card.finished { border-color:#00c853; }
        .team-row { display:flex; align-items:center; gap:8px; padding:4px 0; }
        .team-row + .team-row { border-top:1px solid #f0fdf5; }
        .flag-sm { width:26px; height:26px; border-radius:50%; object-fit:cover; border:1.5px solid #e2f5ea; flex-shrink:0; }
        .team-name { flex:1; font-size:0.83rem; font-weight:600; color:#1a3a2a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        @media (max-width:640px) {
          .team-name { font-size:0.65rem; }
          .match-card { min-width:140px; padding:8px 10px; }
          .flag-sm { width:20px; height:20px; }
        }
        .team-name.tbd { color:#94a3b8; font-style:italic; font-weight:400; }
        .score { font-family:'Bebas Neue',sans-serif; font-size:1.15rem; color:#006b2a; min-width:18px; text-align:right; }
        .score.winner { color:#00c853; }
        .tbd-dots { display:flex; gap:3px; align-items:center; }
        .tbd-dot  { width:4px; height:4px; border-radius:50%; background:#cbd5e1; animation:pulse 1.5s ease-in-out infinite; }
        .tbd-dot:nth-child(2) { animation-delay:.3s; }
        .tbd-dot:nth-child(3) { animation-delay:.6s; }
        @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
        .round-col.final .match-card { border-color:#FFD600; box-shadow:0 4px 20px rgba(255,214,0,0.25); }
        .round-col.third .match-card { border-color:#94a3b8; }
      </style>

      <div th:replace="~{fragments/bracket-view :: bracket-view}"></div>

    </div>

  </div>

</th:block>
</body>
</html>
