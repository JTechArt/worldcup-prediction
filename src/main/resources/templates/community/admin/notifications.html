<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/community-base :: layout(~{::main-content})}">
<head><title>Notifications</title></head>
<body>
<th:block th:fragment="main-content">

  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <div class="mb-8">
      <h1 class="font-display text-4xl text-green-dark tracking-wider mb-1">NOTIFICATIONS</h1>
      <p class="text-gray-500 text-sm font-medium" th:text="${community.name} + ' · Admin'">Community Admin</p>
    </div>

    <div th:if="${successMessage}" class="mb-4 p-3 bg-green-100 border border-green-300 text-green-800 rounded-lg text-sm" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-4 p-3 bg-red-100 border border-red-300 text-red-800 rounded-lg text-sm" th:text="${errorMessage}"></div>

    <!-- Invite User -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Invite User</h2>
      <form th:action="@{'/c/' + ${slug} + '/admin/notifications/invite'}" method="post" class="flex items-end gap-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="flex-1">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="user@example.com"
                 class="w-full rounded-lg border-gray-300 text-sm px-3 py-2 border"/>
        </div>
        <button type="submit" class="bg-green-dark hover:bg-green text-white rounded-lg px-4 py-2 text-sm font-semibold">
          Send Invitation
        </button>
      </form>
    </div>

    <!-- Manual Triggers -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Manual Notifications</h2>
      <div class="space-y-4">
        <div class="pb-4 border-b border-gray-100">
          <label class="block text-sm font-medium text-gray-700 mb-1">Prediction Reminder</label>
          <p class="text-xs text-gray-400 mb-2">Send reminders to users who haven't predicted for a match.</p>
          <form th:action="''" method="post" class="flex items-center gap-3" id="reminderForm2">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <select class="flex-1 rounded-lg border-gray-300 text-sm px-3 py-2 border"
                    th:attr="onchange='document.getElementById(\'reminderForm2\').action=\'/c/' + ${slug} + '/admin/notifications/reminder/\' + this.value'">
              <option value="">Select a match…</option>
              <option th:each="match : ${upcomingMatches}" th:value="${match.id}"
                      th:text="${(match.homeTeam != null ? match.homeTeam.name : 'TBD') + ' vs ' + (match.awayTeam != null ? match.awayTeam.name : 'TBD')}">
              </option>
            </select>
            <button type="submit" class="bg-green-dark hover:bg-green text-white rounded-lg px-4 py-2 text-sm font-semibold">Send</button>
          </form>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Leaderboard Digest</label>
          <form th:action="@{'/c/' + ${slug} + '/admin/notifications/leaderboard-digest'}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="bg-green-dark hover:bg-green text-white rounded-lg px-4 py-2 text-sm font-semibold">Send Digest</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Recent Notifications -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-4">Recent Notifications</h2>
      <div th:if="${#lists.isEmpty(recentLogs)}" class="text-center text-sm text-gray-400 py-8">No notifications sent yet.</div>
      <table th:unless="${#lists.isEmpty(recentLogs)}" class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-200 text-left">
            <th class="pb-3 font-semibold text-gray-600">Type</th>
            <th class="pb-3 font-semibold text-gray-600">Recipient</th>
            <th class="pb-3 font-semibold text-gray-600">Sent At</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr th:each="log : ${recentLogs}">
            <td class="py-3"><span class="px-2 py-0.5 rounded text-xs font-mono font-medium bg-gray-100 text-gray-700" th:text="${log.type}">TYPE</span></td>
            <td class="py-3 text-gray-700" th:text="${log.recipientEmail}">email</td>
            <td class="py-3 text-gray-500" th:text="${#temporals.format(log.sentAt, 'dd MMM yyyy HH:mm')}">01 Jan 2026</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</th:block>
</body>
</html>
