<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/community-base :: layout(~{::main-content})}">
<head><title>Members</title></head>
<body>
<th:block th:fragment="main-content">

  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <div class="mb-8">
      <h1 class="font-display text-4xl text-green-dark tracking-wider mb-1">MEMBERS</h1>
      <p class="text-gray-500 text-sm font-medium" th:text="${community.name} + ' · Admin'">Community Admin</p>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="mb-4 p-3 bg-green-100 border border-green-300 text-green-800 rounded-lg text-sm" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-4 p-3 bg-red-100 border border-red-300 text-red-800 rounded-lg text-sm" th:text="${errorMessage}"></div>

    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-green-dark text-white">
          <tr>
            <th class="px-4 py-3 text-left font-semibold">User</th>
            <th class="px-4 py-3 text-center font-semibold">Role</th>
            <th class="px-4 py-3 text-center font-semibold">Status</th>
            <th class="px-4 py-3 text-center font-semibold">Points</th>
            <th class="px-4 py-3 text-right font-semibold">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr th:each="m : ${memberships}" class="hover:bg-green-light/20">
            <td class="px-4 py-3">
              <div class="flex items-center gap-2">
                <img th:src="${m.user.avatarUrl}" th:alt="${m.user.fullName}"
                     class="w-8 h-8 rounded-full object-cover border border-gray-200"
                     onerror="this.src='https://ui-avatars.com/api/?name='+encodeURIComponent(this.alt)+'&background=006b2a&color=fff'"/>
                <div>
                  <div class="font-semibold text-gray-800" th:text="${m.user.fullName}">Name</div>
                  <div class="text-xs text-gray-400" th:text="${m.user.email}">email</div>
                </div>
              </div>
            </td>
            <td class="px-4 py-3 text-center">
              <span class="px-2 py-0.5 rounded text-xs font-medium"
                    th:classappend="${m.role.name() == 'ADMIN'} ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-600'"
                    th:text="${m.role.name()}">MEMBER</span>
            </td>
            <td class="px-4 py-3 text-center">
              <span class="px-2 py-0.5 rounded text-xs font-medium"
                    th:classappend="${m.status.name() == 'ACTIVE'} ? 'bg-green-100 text-green-700' : (${m.status.name() == 'PENDING'} ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700')"
                    th:text="${m.status.name()}">ACTIVE</span>
            </td>
            <td class="px-4 py-3 text-center font-semibold" th:text="${m.totalPoints}">0</td>
            <td class="px-4 py-3 text-right">
              <div class="flex items-center justify-end gap-2">
                <form th:if="${m.status.name() == 'PENDING'}" th:action="@{'/c/' + ${slug} + '/admin/members/' + ${m.user.id} + '/approve'}" method="post" class="inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="px-2 py-1 rounded text-xs font-semibold bg-green-100 text-green-700 hover:bg-green-200">Approve</button>
                </form>
                <form th:if="${m.status.name() == 'PENDING'}" th:action="@{'/c/' + ${slug} + '/admin/members/' + ${m.user.id} + '/reject'}" method="post" class="inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="px-2 py-1 rounded text-xs font-semibold bg-red-100 text-red-700 hover:bg-red-200">Reject</button>
                </form>
                <form th:if="${m.status.name() == 'ACTIVE' && m.role.name() == 'MEMBER'}" th:action="@{'/c/' + ${slug} + '/admin/members/' + ${m.user.id} + '/role'}" method="post" class="inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="role" value="ADMIN"/>
                  <button type="submit" class="px-2 py-1 rounded text-xs font-semibold bg-amber-100 text-amber-700 hover:bg-amber-200">Make Admin</button>
                </form>
                <form th:if="${m.status.name() == 'ACTIVE' && m.role.name() == 'ADMIN'}" th:action="@{'/c/' + ${slug} + '/admin/members/' + ${m.user.id} + '/role'}" method="post" class="inline">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="role" value="MEMBER"/>
                  <button type="submit" class="px-2 py-1 rounded text-xs font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200">Remove Admin</button>
                </form>
                <form th:action="@{'/c/' + ${slug} + '/admin/members/' + ${m.user.id} + '/remove'}" method="post" class="inline"
                      onsubmit="return confirm('Remove this member from the community?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="px-2 py-1 rounded text-xs font-semibold bg-red-50 text-red-600 hover:bg-red-100">Remove</button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</th:block>
</body>
</html>
