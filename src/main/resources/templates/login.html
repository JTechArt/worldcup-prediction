<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Sign In')}"></head>
<style>
  .login-bg-img {
    position: absolute; inset: 0;
    background: url('/images/landing-hero.jpg') center center / cover no-repeat;
    filter: brightness(0.5) saturate(1.2);
  }
  @media (max-width: 640px) {
    .login-bg-img {
      background-size: 100% auto;
      background-position: center top;
    }
  }
</style>
<body class="min-h-screen bg-wc-dark-green flex items-center justify-center overflow-hidden relative">

    <!-- Background image (mobile: small band showing 2 player faces, gradient overlays fill top/bottom) -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="login-bg-img"></div>
        <!-- Top overlay: just a subtle vignette on mobile so player faces show through -->
        <div class="absolute inset-x-0 top-0"
             style="height:25%; background: linear-gradient(to bottom, rgba(0,26,8,0.7) 0%, transparent 100%);"></div>
        <!-- Bottom overlay: solid bg-color fading into image -->
        <div class="absolute inset-x-0 bottom-0"
             style="height:40%; background: linear-gradient(to top, #001a08 0%, #001a08 30%, rgba(0,26,8,0.6) 70%, transparent 100%);"></div>
    </div>

    <div class="relative z-10 w-full max-w-md px-6">

        <!-- Logo -->
        <div class="text-center mb-8 stagger-1 animate-fade-up">
            <div class="text-6xl mb-4">⚽</div>
            <h1 class="font-display text-5xl text-wc-gold tracking-widest mb-2">WC 2026</h1>
            <p class="text-green-200 text-sm font-medium tracking-wider uppercase">Prediction Game</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8 stagger-2 animate-fade-up">

            <h2 class="text-center text-gray-800 font-semibold text-xl mb-2">Welcome</h2>
            <p class="text-center text-gray-500 text-sm mb-8">Sign in to make your predictions</p>

            <!-- Error message -->
            <div th:if="${error}"
                 class="mb-6 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 text-center"
                 role="alert">
                <span th:text="${error}">Error</span>
            </div>

            <!-- Sign in with Google -->
            <a href="/oauth2/authorization/google"
               class="flex items-center justify-center gap-3 w-full border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 rounded-xl transition-all duration-200 mb-4">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Sign in with Google</span>
            </a>

            <!-- Sign in with LinkedIn -->
            <a href="/oauth2/authorization/linkedin"
               class="flex items-center justify-center gap-3 w-full bg-[#0A66C2] hover:bg-[#004182] text-white font-medium py-3 px-4 rounded-xl transition-all duration-200 mb-6">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
                <span>Sign in with LinkedIn</span>
            </a>

            <div class="flex items-center gap-3 mb-6">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="text-gray-400 text-xs">or sign in with email</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>

            <!-- Email error message -->
            <div th:if="${emailError}"
                 class="mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 text-center"
                 role="alert">
                <span th:text="${emailError}">Error</span>
            </div>

            <!-- Email/password form -->
            <form th:action="@{/login/email}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <input type="email" name="email" placeholder="Email address" required
                           class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-wc-green focus:border-transparent transition-all duration-200"/>
                </div>
                <div class="mb-4">
                    <input type="password" name="password" placeholder="Password" required
                           class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-wc-green focus:border-transparent transition-all duration-200"/>
                </div>
                <button type="submit"
                        class="w-full bg-wc-dark-green hover:bg-wc-green text-white font-medium py-2.5 px-4 rounded-xl transition-all duration-200 text-sm mb-4">
                    Sign In with Email
                </button>
            </form>

            <p class="text-center text-sm text-gray-500">
                New user?
                <a href="/register" class="text-wc-dark-green font-medium hover:underline">Register here →</a>
            </p>
        </div>

        <p class="text-center text-green-300 text-xs mt-6 stagger-3 animate-fade-up">
            Sign up to join a community and make your predictions.
        </p>
    </div>

</body>
</html>
