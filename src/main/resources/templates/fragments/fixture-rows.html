<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="fixture-rows">

  <!-- Empty state -->
  <div th:if="${grouped == null or grouped.isEmpty()}"
       class="text-center py-20 text-gray-400">
    <div class="text-5xl mb-4">📅</div>
    <p class="text-lg font-semibold">No fixtures found</p>
    <p class="text-sm mt-1">Try selecting a different filter.</p>
  </div>

  <!-- Phase → Date grouping -->
  <div th:each="phaseEntry, phaseStat : ${grouped}" class="mb-10">

    <!-- Phase header with shimmer badge -->
    <div class="flex items-center gap-3 mb-4">
      <span class="phase-badge" th:text="${phaseEntry.key}">Group Stage</span>
      <div class="flex-1 h-px bg-green/20"></div>
    </div>

    <!-- Date groups within phase -->
    <div th:each="dateEntry : ${phaseEntry.value}" class="mb-6">

      <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 pl-1"
           th:text="${#temporals.format(dateEntry.key, 'EEEE, d MMMM yyyy')}">
        Monday, 15 June 2026
      </div>

      <div class="space-y-2">
        <div th:each="fixture, fStat : ${dateEntry.value}"
             class="bg-white rounded-2xl border border-gray-100 shadow-sm
                    hover:shadow-md hover:border-green/30 transition-all duration-200 overflow-hidden">

          <div class="flex items-center px-4 py-3 gap-3">

            <!-- Time + venue -->
            <div class="w-28 flex-shrink-0 text-right pr-3 border-r border-gray-100">
              <div class="text-xs font-bold text-gray-700"
                   th:text="${#temporals.format(fixture.kickoff, 'HH:mm')} + ' UTC'">20:00 UTC</div>
              <div class="text-xs text-gray-400 mt-0.5 leading-tight" th:text="${fixture.city}">Dallas</div>
            </div>

            <!-- Home team -->
            <div class="flex items-center gap-2 flex-1 justify-end">
              <span class="text-sm font-semibold text-gray-800 text-right" th:text="${fixture.homeTeamName}">Brazil</span>
              <img th:if="${fixture.homeTeamCode != null}"
                   th:src="@{'/images/flags/' + ${fixture.homeTeamCode} + '.svg'}"
                   th:alt="${fixture.homeTeamName}"
                   class="flag-circle w-7 h-7" />
              <span th:unless="${fixture.homeTeamCode != null}"
                    class="w-7 h-7 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-xs text-gray-400">?</span>
            </div>

            <!-- Score or VS -->
            <div class="w-20 flex-shrink-0 text-center">
              <div th:if="${fixture.completed}" class="font-display text-xl tracking-widest text-green-dark">
                <span th:text="${fixture.homeScore}">2</span>
                <span class="text-gray-300 mx-0.5">–</span>
                <span th:text="${fixture.awayScore}">1</span>
              </div>
              <div th:unless="${fixture.completed}">
                <span class="font-display text-base tracking-widest text-gray-300">VS</span>
              </div>
            </div>

            <!-- Away team -->
            <div class="flex items-center gap-2 flex-1 justify-start">
              <img th:if="${fixture.awayTeamCode != null}"
                   th:src="@{'/images/flags/' + ${fixture.awayTeamCode} + '.svg'}"
                   th:alt="${fixture.awayTeamName}"
                   class="flag-circle w-7 h-7" />
              <span th:unless="${fixture.awayTeamCode != null}"
                    class="w-7 h-7 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-xs text-gray-400">?</span>
              <span class="text-sm font-semibold text-gray-800" th:text="${fixture.awayTeamName}">Germany</span>
            </div>

            <!-- Status pill -->
            <div class="w-20 flex-shrink-0 flex justify-end">
              <span th:if="${fixture.completed}"
                    class="text-xs font-bold px-2.5 py-1 rounded-full bg-green/10 text-green-dark">FT</span>
              <span th:if="${!fixture.completed and fixture.today}"
                    class="text-xs font-bold px-2.5 py-1 rounded-full bg-orange/10 text-orange animate-pulse">TODAY</span>
              <span th:if="${!fixture.completed and !fixture.today}"
                    class="text-xs font-medium px-2.5 py-1 rounded-full bg-gray-100 text-gray-400">TBD</span>
            </div>

          </div>

          <!-- Group label sub-line -->
          <div th:if="${fixture.groupLabel != null}"
               class="bg-gray-50 border-t border-gray-100 px-4 py-1.5 flex items-center gap-2">
            <span class="text-xs text-gray-400 font-medium" th:text="${fixture.groupLabel}">Group A</span>
            <span class="text-gray-200">·</span>
            <span class="text-xs text-gray-400" th:text="${fixture.venue}">SoFi Stadium</span>
          </div>

        </div>
      </div>
    </div>
  </div>

</th:block>

</body>
</html>
