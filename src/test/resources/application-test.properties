# SQLite in-memory database for tests (no file created, no cleanup needed)
spring.datasource.url=jdbc:sqlite::memory:?cache=shared
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# SQLite type system uses INTEGER for all integer columns; Hibernate expects BIGINT for Long.
# Use none — Flyway applies and validates the schema.
spring.jpa.hibernate.ddl-auto=none

# Flyway: apply migrations to in-memory SQLite
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.mixed=true

# Show SQL in tests
spring.jpa.show-sql=true

# Disable security for context load test — OAuth2 config not present in test environment
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
